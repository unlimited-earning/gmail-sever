<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Gmail Vault Pro</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#040209">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root {
      --bg-primary: #040209;
      --accent-cyan: #00f2fe;
      --accent-purple: #9d4edd;
      --text-primary: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-primary);
      background-image: radial-gradient(circle at center, #130a2a 0%, #040209 100%);
      color: var(--text-primary);
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .splash-container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .logo-outer {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .logo-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--accent-cyan);
      border-bottom-color: var(--accent-purple);
      animation: spin 2s linear infinite;
    }
    .logo-inner {
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
      width: 86px;
      height: 86px;
      border-radius: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 40px rgba(0, 242, 254, 0.4);
      animation: pulse 2s ease-in-out infinite;
    }
    .logo-icon {
      width: 42px;
      height: 42px;
      fill: #fff;
    }
    .brand-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 2px;
      background: linear-gradient(to right, #ffffff, #c7d2fe, var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0;
      transform: translateY(15px);
      animation: fadeInUp 0.8s forwards ease-out;
      animation-delay: 0.3s;
    }
    .loader {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .dot {
      width: 10px;
      height: 10px;
      background: var(--accent-cyan);
      border-radius: 50%;
      animation: wave 1.2s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; background: #5e72e4; }
    .dot:nth-child(3) { animation-delay: 0.4s; background: var(--accent-purple); }

    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    @keyframes wave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  </style>
</head>
<body>

  <div class="splash-container">
    <div class="logo-outer">
      <div class="logo-ring"></div>
      <div class="logo-inner">
        <svg class="logo-icon" viewBox="0 0 24 24">
          <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
        </svg>
      </div>
    </div>
    <h1 class="brand-title">GMAIL VAULT PRO</h1>
    <div class="loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script type="module">
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Service Worker Registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {});
      });
    }

    // Safety Timeout Loop: 
    // কোনো কারণে মডিউল ব্লক বা কানেকশন এরর হলে ৪ সেকেন্ড পর এটি নিজে থেকেই লগইন স্ক্রিনে নিয়ে যাবে।
    const safetyTimeout = setTimeout(() => {
      console.warn("Firebase execution delayed or blocked. Initiating fallback redirection.");
      window.location.href = 'login.html';
    }, 4000);

    try {
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      onAuthStateChanged(auth, (user) => {
        clearTimeout(safetyTimeout); // ফায়ারবেস কাজ করলে সেফটি টাইমারটি বন্ধ হবে।
        if (user) {
          window.location.href = 'home.html';
        } else {
          window.location.href = 'login.html';
        }
      }, (error) => {
        clearTimeout(safetyTimeout);
        window.location.href = 'login.html';
      });
    } catch (e) {
      console.error("Initialization error:", e);
      clearTimeout(safetyTimeout);
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
