<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Dashboard - Gmail Vault Pro</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#040209">
  <style>
    :root {
      --bg-primary: #040209;
      --bg-surface: rgba(255, 255, 255, 0.03);
      --accent-cyan: #00f2fe;
      --accent-purple: #9d4edd;
      --text-primary: #ffffff;
      --text-secondary: #a0aec0;
      --border-color: rgba(255, 255, 255, 0.08);
      --gradient-primary: linear-gradient(135deg, #9d4edd, #00f2fe);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg-primary);
      background-image: radial-gradient(circle at top left, rgba(157, 78, 221, 0.12) 0%, transparent 45%),
                        radial-gradient(circle at bottom right, rgba(0, 242, 254, 0.12) 0%, transparent 45%);
      color: var(--text-primary); min-height: 100vh; padding-bottom: 90px;
    }
    .header-bar {
      display: flex; justify-content: space-between; align-items: center; padding: 20px;
      backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100;
    }
    .dashboard-container { padding: 20px; max-width: 600px; margin: 0 auto; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 20px; padding: 20px;
      text-align: center; position: relative; overflow: hidden;
    }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; }
    .total-card::before { background: var(--accent-cyan); }
    .fav-card::before { background: var(--accent-purple); }
    .stat-card h3 { font-size: 32px; margin-bottom: 4px; font-weight: 800; }
    .stat-card p { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
    .recent-list { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 24px; padding: 20px; margin-bottom: 24px; }
    .section-title { font-size: 13px; font-weight: 700; color: var(--text-secondary); margin-bottom: 14px; display: flex; justify-content: space-between; letter-spacing: 0.5px; }
    .item-card {
      display: flex; justify-content: space-between; align-items: center; padding: 14px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer; transition: background 0.2s;
    }
    .item-card:last-child { border: none; }
    .badge { background: rgba(0, 242, 254, 0.1); color: var(--accent-cyan); font-size: 11px; padding: 4px 8px; border-radius: 20px; border: 1px solid rgba(0,242,254,0.15); }
    
    /* Shared Navigation */
    .bottom-nav {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 440px;
      background: rgba(4, 2, 9, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border-color);
      border-radius: 24px; display: flex; justify-content: space-around; padding: 12px 6px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); z-index: 1000;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-secondary); text-decoration: none; font-size: 10px; gap: 4px; }
    .nav-item.active { color: var(--accent-cyan); }
    .nav-item svg { width: 20px; height: 20px; fill: currentColor; }
  </style>
</head>
<body>

  <div class="header-bar">
    <div>
      <p style="font-size: 11px; color: var(--text-secondary); text-transform: uppercase;">Secured Connection</p>
      <h1 id="userName" style="font-size: 18px; font-weight: 800;">Syncing identity...</h1>
    </div>
    <div style="width: 12px; height: 12px; border-radius: 50%; background: #00ff66; box-shadow: 0 0 10px #00ff66;"></div>
  </div>

  <div class="dashboard-container">
    <div class="stats-grid">
      <div class="stat-card total-card">
        <h3 id="totalGmails">-</h3>
        <p>Total Records</p>
      </div>
      <div class="stat-card fav-card">
        <h3 id="favoriteGmails">-</h3>
        <p>Favorites</p>
      </div>
    </div>

    <div class="recent-list">
      <div class="section-title">
        <span>RECENT HARDWARE LOGS</span>
        <span style="color: var(--accent-cyan); cursor: pointer;" onclick="location.href='gmail-list.html'">EXPLORE</span>
      </div>
      <div id="recentItemsContainer">
        <p style="text-align: center; color: var(--text-secondary); font-size: 13px; padding: 20px;">Retrieving telemetry data...</p>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="home.html" class="nav-item active">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home
    </a>
    <a href="gmail-list.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M4 14h6v-10h-6v10zm0 5h6v-3h-6v3zm8-15v10h6v-10h-6zm0 15h6v-3h-6v3z"/></svg>Vault
    </a>
    <a href="add-gmail.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>Add
    </a>
    <a href="search.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>Search
    </a>
    <a href="settings.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>Options
    </a>
  </div>

  <script type="module">
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js').catch(() => {});
    }

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      const userSnap = await get(ref(db, `users/${user.uid}`));
      if (userSnap.exists()) {
        document.getElementById('userName').textContent = userSnap.val().name;
      } else {
        document.getElementById('userName').textContent = "Vault Operator";
      }

      const vaultRef = ref(db, `gmailVault/${user.uid}`);
      onValue(vaultRef, (snapshot) => {
        if (!snapshot.exists()) {
          document.getElementById('totalGmails').textContent = "0";
          document.getElementById('favoriteGmails').textContent = "0";
          document.getElementById('recentItemsContainer').innerHTML = `<p style="text-align: center; color: var(--text-secondary); font-size: 13px; padding: 20px;">No encrypted nodes stored.</p>`;
          return;
        }

        const data = snapshot.val();
        const records = Object.keys(data).map(key => ({ id: key, ...data[key] }));

        document.getElementById('totalGmails').textContent = records.length;
        document.getElementById('favoriteGmails').textContent = records.filter(r => r.favorite).length;

        // Sort by update timestamp
        records.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        const recentSubset = records.slice(0, 3);

        let html = '';
        recentSubset.forEach(item => {
          html += `
            <div class="item-card" onclick="location.href='gmail-details.html?id=${item.id}'">
              <div>
                <h4 style="font-size:14px; font-weight:600;">${item.gmailAddress}</h4>
                <p style="font-size:12px; color: var(--text-secondary); margin-top:2px;">${item.label || 'Unassigned'}</p>
              </div>
              <span class="badge">${item.favorite ? '★ Fav' : 'Active'}</span>
            </div>`;
        });
        document.getElementById('recentItemsContainer').innerHTML = html;
      });
    });
  </script>
</body>
</html>
