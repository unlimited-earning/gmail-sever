<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Add Record - Gmail Vault Pro</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#040209">
  <style>
    :root {
      --bg-primary: #040209;
      --bg-surface: rgba(255, 255, 255, 0.03);
      --accent-cyan: #00f2fe;
      --accent-purple: #9d4edd;
      --text-primary: #ffffff;
      --text-secondary: #a0aec0;
      --border-color: rgba(255, 255, 255, 0.08);
      --gradient-primary: linear-gradient(135deg, #9d4edd, #00f2fe);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg-primary); background-image: radial-gradient(circle at top right, rgba(157, 78, 221, 0.12) 0%, transparent 45%); color: var(--text-primary); min-height: 100vh; padding-bottom: 110px; }
    .header-bar { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); position: sticky; top:0; z-index:90; }
    .form-container { padding: 20px; max-width: 500px; margin: 0 auto; }
    .glass-form-card { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 24px; padding: 24px; }
    .input-group { margin-bottom: 18px; }
    .input-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .input-wrapper input, .input-wrapper textarea, .input-wrapper select {
      width: 100%; background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border-color);
      border-radius: 14px; padding: 13px; color: #fff; font-size: 14px; outline: none; transition: 0.3s;
    }
    .input-wrapper input:focus, .input-wrapper textarea:focus { border-color: var(--accent-cyan); box-shadow: 0 0 10px rgba(0,242,254,0.2); }
    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px; }
    .btn { padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; border: none; font-size: 15px; }
    .btn-save { background: var(--gradient-primary); color: white; }
    .btn-cancel { background: rgba(255, 255, 255, 0.05); color: var(--text-secondary); border: 1px solid var(--border-color); }
    
    .bottom-nav {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 440px;
      background: rgba(4, 2, 9, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border-color);
      border-radius: 24px; display: flex; justify-content: space-around; padding: 12px 6px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); z-index: 1000;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-secondary); text-decoration: none; font-size: 10px; gap: 4px; }
    .nav-item.active { color: var(--accent-cyan); }
    .nav-item svg { width: 20px; height: 20px; fill: currentColor; }
  </style>
</head>
<body>

  <div class="header-bar">
    <h2 style="font-size:18px; font-weight:800;">Package Cipher</h2>
    <span style="font-size:11px; color:var(--accent-cyan); background:rgba(0,242,254,0.1); border:1px solid rgba(0,242,254,0.2); padding:4px 10px; border-radius:12px;">LOCAL SHIFT</span>
  </div>

  <div class="form-container">
    <div class="glass-form-card">
      <form id="vaultForm">
        <div class="input-group">
          <label>Gmail Address</label>
          <div class="input-wrapper"><input type="email" id="gmailAddress" placeholder="example@gmail.com" required></div>
        </div>
        <div class="input-group">
          <label>Credential Password</label>
          <div class="input-wrapper"><input type="password" id="gmailPassword" placeholder="••••••••" required></div>
        </div>
        <div class="input-group">
          <label>Recovery Phone Number</label>
          <div class="input-wrapper"><input type="tel" id="recoveryPhone" placeholder="Optional recovery phone"></div>
        </div>
        <div class="input-group">
          <label>Recovery Email</label>
          <div class="input-wrapper"><input type="email" id="recoveryEmail" placeholder="Optional recovery email"></div>
        </div>
        <div class="input-group">
          <label>Authenticator / Backup Tokens</label>
          <div class="input-wrapper"><input type="text" id="authenticatorSecret" placeholder="2FA or physical codes"></div>
        </div>
        <div class="input-group">
          <label>Functional Label</label>
          <div class="input-wrapper">
            <select id="label">
              <option value="Personal">Personal</option>
              <option value="Finance">Finance</option>
              <option value="Gaming">Gaming</option>
              <option value="Enterprise">Enterprise</option>
            </select>
          </div>
        </div>
        <div class="input-group">
          <label>Meta Notes</label>
          <div class="input-wrapper"><textarea id="notes" rows="3" placeholder="Context data..."></textarea></div>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; padding: 4px 0;">
          <label style="font-size:13px; color:var(--text-secondary); font-weight:600;">Index inside Favorites</label>
          <input type="checkbox" id="favorite" style="width:22px; height:22px; accent-color: var(--accent-cyan); cursor:pointer;">
        </div>
        <div class="btn-row">
          <button type="button" class="btn btn-cancel" onclick="location.href='home.html'">Abort</button>
          <button type="submit" class="btn btn-save" id="saveBtn">Encrypt & Store</button>
        </div>
      </form>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="home.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Home
    </a>
    <a href="gmail-list.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M4 14h6v-10h-6v10zm0 5h6v-3h-6v3zm8-15v10h6v-10h-6zm0 15h6v-3h-6v3z"/></svg>Vault
    </a>
    <a href="add-gmail.html" class="nav-item active">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>Add
    </a>
    <a href="search.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09( 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>Search
    </a>
    <a href="settings.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>Options
    </a>
  </div>

  <script type="module">
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, push, get, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js').catch(() => {});
    }

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;
    onAuthStateChanged(auth, (user) => {
      if (!user) { window.location.href = 'login.html'; }
      else { currentUser = user; }
    });

    document.getElementById('vaultForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!currentUser) return;

      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Writing node...';

      const gmailAddress = document.getElementById('gmailAddress').value.trim().toLowerCase();
      const gmailPassword = document.getElementById('gmailPassword').value;
      const recoveryPhone = document.getElementById('recoveryPhone').value.trim();
      const recoveryEmail = document.getElementById('recoveryEmail').value.trim();
      const authenticatorSecret = document.getElementById('authenticatorSecret').value.trim();
      const label = document.getElementById('label').value;
      const notes = document.getElementById('notes').value.trim();
      const favorite = document.getElementById('favorite').checked;

      try {
        const vaultRef = ref(db, `gmailVault/${currentUser.uid}`);
        const snapshot = await get(vaultRef);

        if (snapshot.exists()) {
          const records = snapshot.val();
          const duplicate = Object.values(records).some(r => r.gmailAddress.toLowerCase() === gmailAddress);
          if (duplicate) {
            alert("Integrity error. This address is already allocated within active security parameters.");
            saveBtn.disabled = false;
            saveBtn.textContent = 'Encrypt & Store';
            return;
          }
        }

        const newRef = push(ref(db, `gmailVault/${currentUser.uid}`));
        await set(newRef, {
          gmailId: newRef.key,
          gmailAddress,
          gmailPassword,
          recoveryPhone,
          recoveryEmail,
          authenticatorSecret,
          label,
          notes,
          favorite,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        });
        window.location.href = 'gmail-list.html';
      } catch (err) {
        alert(err.message);
        saveBtn.disabled = false;
        saveBtn.textContent = 'Encrypt & Store';
      }
    });
  </script>
</body>
</html>
